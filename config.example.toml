# caur configuration — copy to ~/.config/caur/config.toml
# All keys are optional: the values below are the defaults.

# Review agent backend. caur shells out to the agent's own CLI in headless mode,
# reusing your existing login/config (no API keys of its own). Supported:
#   claude-cli  -> Claude  (`claude`)        [default]
#   codex-cli   -> Codex / GPT (`codex`)      (aliases: codex, gpt, openai)
#   ollama      -> local models (`ollama`)    (requires `model`)
#   gemini-cli  -> Gemini  (`gemini`)         (alias: gemini)
backend = "claude-cli"

# Model alias to pass to the backend. Leave empty to use the agent's default /
# logged-in model. Examples: "opus", "gpt-5-codex", "llama3.1", "gemini-2.5-pro".
# Note: the "ollama" backend requires a model here.
model = ""

# Number of *significant* findings (severity medium or higher) that triggers a
# block. 1 = any medium+ finding blocks. low/info findings do not block on their
# own; a verdict other than "clean" blocks regardless.
block_threshold = 1

# If true, a "clean" verdict (and below threshold) proceeds without asking.
auto_approve_clean = true

# Reuse the review outcome when the PKGBUILD files are unchanged.
cache_reviews = true

# On upgrades, review only the DIFF against the last approved version (fewer
# tokens, focus on the changes). Requires cache_reviews.
diff_review = true

# Flag (as a high-severity finding, which blocks) if the package is orphaned or
# if the maintainer changed since the last approved review.
maintainer_change = true

# After a review, offer to open the configured agent's interactive CLI in the
# package's clone directory to inspect it hands-on. Skipped when non-interactive.
interactive_inspect = true

# Allowlist of trusted pkgbases: skip the review entirely.
trusted_packages = []

# Executable/path of the underlying AUR engine.
yay_path = "yay"
