# Configurazione di caur — copiare in ~/.config/caur/config.toml
# Tutte le chiavi sono opzionali: i valori qui sotto sono i default.

# Backend del motore di review. Per ora solo "claude-cli" (usa il CLI `claude`
# in modalità headless, sfruttando il login esistente — nessuna API key).
backend = "claude-cli"

# Alias del modello da passare al backend. Lasciare vuoto per usare il modello
# con cui il CLI claude è loggato. Esempi: "claude-fable-5", "opus".
model = ""

# Numero di rilievi *significativi* (severità medium o superiore) che fa scattare
# il blocco. 1 = qualsiasi rilievo medium+ blocca. I rilievi low/info non bloccano
# da soli; un verdetto diverso da "clean" blocca comunque.
block_threshold = 1

# Se true, un verdetto "clean" (e sotto soglia) procede senza chiedere conferma.
auto_approve_clean = true

# Riusa l'esito della review quando i file del PKGBUILD non sono cambiati.
cache_reviews = true

# Sugli aggiornamenti, revisiona solo il DIFF rispetto all'ultima versione
# approvata (meno token, focus sulle modifiche). Richiede cache_reviews.
diff_review = true

# Segnala (come finding ad alta severità, quindi blocca) se il pacchetto è
# orfano o se il maintainer è cambiato rispetto all'ultima review approvata.
maintainer_change = true

# Allowlist di pkgbase fidati: saltano completamente la review.
trusted_packages = []

# Eseguibile/path del motore AUR sottostante.
yay_path = "yay"
